<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#62a0ea"/>
      <stop offset="100%" stop-color="#1c71d8"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <g fill="#ffffff">
    <!-- Phone body: rounded trapezoidal base. -->
    <path d="M 26 60
             C 26 51, 32 47, 40 47
             L 88 47
             C 96 47, 102 51, 102 60
             L 108 104
             C 108 108, 104 110, 100 110
             L 28 110
             C 24 110, 20 108, 20 104
             Z"/>

    <!-- Handset: dog-bone with two earpiece bulbs and a bar. -->
    <circle cx="30" cy="30" r="13"/>
    <circle cx="98" cy="30" r="13"/>
    <rect x="30" y="24" width="68" height="12" rx="3"/>
  </g>

  <!-- Rotary dial: ring with finger holes around the perimeter and a
       center hub. Drawn in the background blue so it reads as a
       cut-out of the white body. -->
  <g fill="#1c71d8">
    <circle cx="64" cy="80" r="18"/>
  </g>
  <g fill="#ffffff">
    <circle cx="64" cy="80" r="14"/>
  </g>
  <g fill="#1c71d8">
    <!-- 10 finger holes around the dial face. -->
    <circle cx="64" cy="69" r="1.6"/>
    <circle cx="71.5" cy="71" r="1.6"/>
    <circle cx="76" cy="76.5" r="1.6"/>
    <circle cx="77.5" cy="83.5" r="1.6"/>
    <circle cx="74.5" cy="89.5" r="1.6"/>
    <circle cx="68" cy="91" r="1.6"/>
    <circle cx="60" cy="91" r="1.6"/>
    <circle cx="53.5" cy="89.5" r="1.6"/>
    <circle cx="50.5" cy="83.5" r="1.6"/>
    <circle cx="52" cy="76.5" r="1.6"/>
    <!-- Center hub. -->
    <circle cx="64" cy="80" r="3.5"/>
  </g>
</svg>
