<?xml version="1.0" encoding="UTF-8"?>
<!-- Adwaita symbolic — single colour (currentColor), read at 16px.
     Vintage rotary phone: cradle base + dial + handset on top. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="#222222">
  <!-- Phone body / cradle. -->
  <path d="M 3 7.5
           C 3 6.4, 3.7 6, 4.5 6
           L 11.5 6
           C 12.3 6, 13 6.4, 13 7.5
           L 13.5 13
           C 13.5 13.5, 13 14, 12.5 14
           L 3.5 14
           C 3 14, 2.5 13.5, 2.5 13
           Z"/>
  <!-- Handset: two earpiece dots + bar. -->
  <circle cx="4" cy="4" r="1.6"/>
  <circle cx="12" cy="4" r="1.6"/>
  <rect x="4" y="3.2" width="8" height="1.6" rx="0.4"/>
  <!-- Dial face — a hole through the body so it reads as a ring. -->
  <circle cx="8" cy="10" r="2.2" fill="#ffffff"/>
  <circle cx="8" cy="10" r="0.7"/>
</svg>
